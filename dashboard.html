<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inspire — Dashboard ao Vivo</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#87a492">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --sage:#87a492;--sage-dark:#5f7d6e;--sage-light:#a8c4b0;
  --sage-pale:#e8f0eb;--sage-mist:#f2f6f3;--forest:#1a2620;
  --text-mid:#3d5045;--text-light:#6b8a74;--gold:#c9a96e;
  --border:#d4e0d8;--white:#ffffff;
  --ok:#5a9e7a;--ok-bg:rgba(90,158,122,.1);
  --warn:#c9a96e;--warn-bg:rgba(201,169,110,.12);
  --err:#b05a5a;--err-bg:rgba(176,90,90,.08);
  --font-d:'Cormorant Garamond',Georgia,serif;
  --font-b:'Jost',sans-serif;
  --r:10px;--r-sm:6px;--r-lg:16px;
  --sh:0 2px 12px rgba(90,125,104,.1);
  --sh-lg:0 8px 32px rgba(44,58,49,.15);
  --tr:.2s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font-b);background:var(--sage-mist);color:var(--forest);min-height:100vh;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow-x:hidden}
h1,h2,h3{font-family:var(--font-d);font-weight:400}

.dash-header{background:var(--sage);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh-lg);flex-shrink:0}
.dash-logo{height:34px;width:auto;object-fit:contain}
.dash-sync{display:flex;align-items:center;gap:6px;font-size:.78rem;color:rgba(255,255,255,.8)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4)}
.sync-dot.online{background:#7ecf9a;box-shadow:0 0 6px #7ecf9a}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sync-dot.syncing{background:var(--gold);animation:blink 1s infinite}

.dash-main{flex:1;padding:28px 16px}
.dash-container{width:100%;max-width:820px;margin:0 auto}

.mode-selector{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
@media(max-width:480px){.mode-selector{grid-template-columns:1fr;gap:10px}}
.mode-card{background:var(--white);border:2px solid var(--border);border-radius:var(--r-lg);padding:24px 18px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--sh);display:none}
.mode-card.active{display:block}
.mode-card:hover{border-color:var(--sage);transform:translateY(-2px);box-shadow:var(--sh-lg)}
.mode-icon{font-size:2.2rem;margin-bottom:8px}
.mode-title{font-family:var(--font-d);font-size:1.4rem;color:var(--forest);margin-bottom:5px}
.mode-desc{font-size:.78rem;color:var(--text-light)}

.event-title-block{text-align:center;margin-bottom:26px}
.event-label{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-light);margin-bottom:5px}
.event-name{font-family:var(--font-d);font-size:2.6rem;font-weight:300;color:var(--forest);line-height:1.1}
.event-meta{font-size:.88rem;color:var(--text-light);margin-top:5px}

.main-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px}
@media(max-width:560px){.main-stats{grid-template-columns:1fr;gap:10px}}
.main-stat-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:24px 14px;text-align:center;box-shadow:var(--sh)}
.main-stat-card.highlight-ok{border-color:rgba(90,158,122,.4);background:var(--ok-bg)}
.main-stat-card.highlight-warn{border-color:rgba(201,169,110,.4);background:var(--warn-bg)}
.stat-icon{font-size:1.5rem;margin-bottom:8px;opacity:.8}
.stat-number{font-family:var(--font-d);font-size:3.8rem;font-weight:300;line-height:1;color:var(--forest);margin-bottom:5px}
.main-stat-card.highlight-ok .stat-number{color:var(--ok)}
.main-stat-card.highlight-warn .stat-number{color:#8a6430}
.stat-label{font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light)}
.stat-sub{font-size:.78rem;color:var(--text-light);margin-top:5px}

.rsvp-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
@media(max-width:560px){.rsvp-stats{grid-template-columns:repeat(2,1fr)}}
.rsvp-stat{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 10px;text-align:center;box-shadow:var(--sh)}
.rsvp-stat.sage{background:var(--sage-pale);border-color:var(--sage-light)}
.rsvp-stat.warn{background:var(--warn-bg);border-color:rgba(201,169,110,.4)}
.rsvp-stat-val{font-family:var(--font-d);font-size:2.4rem;font-weight:300;line-height:1;color:var(--forest)}
.rsvp-stat-lbl{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-light);margin-top:3px}

.search-section{margin-bottom:16px}
.search-label{font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-light);margin-bottom:7px}
.dash-search{width:100%;padding:11px 16px;border:1.5px solid var(--border);border-radius:30px;font-family:var(--font-b);font-size:16px;color:var(--forest);background:var(--white);-webkit-appearance:none;outline:none;transition:border-color .2s;box-shadow:var(--sh)}
.dash-search:focus{border-color:var(--sage)}

.guest-list{display:flex;flex-direction:column;gap:5px}
.guest-item{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:9px 13px;display:flex;align-items:center;gap:9px;font-size:.88rem;box-shadow:var(--sh)}
.guest-item.presente{background:var(--ok-bg);border-color:rgba(90,158,122,.3)}
.guest-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
.guest-item.presente .guest-dot{background:var(--ok)}
.guest-name{flex:1;font-weight:600;color:var(--forest);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.guest-meta{font-size:.74rem;color:var(--text-light);flex-shrink:0}
.guest-badge{font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.guest-badge.presente{background:var(--ok-bg);color:var(--ok);border:1px solid rgba(90,158,122,.3)}
.guest-badge.aguardando{background:var(--sage-pale);color:var(--text-light);border:1px solid var(--border)}
.guest-badge.confirmado{background:var(--sage-pale);color:var(--sage-dark);border:1px solid var(--sage-light)}
.guest-badge.recusado{background:var(--err-bg);color:var(--err);border:1px solid rgba(176,90,90,.25)}

.no-results{text-align:center;padding:22px;color:var(--text-light);font-size:.9rem}
.loading{text-align:center;padding:40px;color:var(--text-light);font-size:.9rem}
.dash-error{text-align:center;padding:40px 16px;color:var(--err)}
.dash-error h2{font-family:var(--font-d);font-size:1.8rem;margin-bottom:8px}

@media(max-width:768px){
  .dash-header{padding:12px 16px}
  .dash-main{padding:16px 12px}
  .event-name{font-size:1.8rem}
  .stat-number{font-size:2.8rem}
  .main-stats{grid-template-columns:1fr;margin-bottom:16px}
  .main-stat-card{padding:16px 12px}
  .rsvp-stats{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .dash-header{padding:10px 12px}
  .dash-main{padding:12px 8px}
  .dash-container{padding:0}
  .event-name{font-size:1.4rem}
  .stat-number{font-size:2.2rem}
  .mode-selector{margin-bottom:16px}
  .mode-card{padding:16px 12px}
  .main-stat-card{padding:12px 10px}
  .guest-item{padding:8px 10px;font-size:.8rem}
}
</style>
</head>
<body>

<div class="dash-header">
  <svg class="dash-logo" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <rect fill="#ffffff" width="40" height="40" rx="6"/>
    <text x="50%" y="50%" font-size="24" font-family="Georgia,serif" font-weight="300" text-anchor="middle" dominant-baseline="middle" fill="#87a492" font-style="italic">I</text>
  </svg>
  <div class="dash-sync">
    <div class="sync-dot online"></div>
    <span id="sync-status">Online</span>
  </div>
</div>

<div class="dash-main">
  <div class="dash-container">
    
    <!-- SELETOR DE MODO -->
    <div class="mode-selector" id="mode-selector">
      <div class="mode-card active" onclick="showMode('live')">
        <div class="mode-icon">📊</div>
        <div class="mode-title">Recepção ao Vivo</div>
        <div class="mode-desc">Check-in em tempo real</div>
      </div>
      <div class="mode-card" onclick="showMode('rsvp')">
        <div class="mode-icon">📋</div>
        <div class="mode-title">RSVP ao Vivo</div>
        <div class="mode-desc">Confirmações em tempo real</div>
      </div>
    </div>

    <!-- MODO: RECEPÇÃO AO VIVO -->
    <div id="mode-live" class="mode-pane" style="display:block">
      <div class="event-title-block" id="live-event-block">
        <div class="event-label">Evento Selecionado</div>
        <div class="event-name" id="live-event-name">—</div>
      </div>

      <!-- STATS PRINCIPAIS -->
      <div class="main-stats">
        <div class="main-stat-card">
          <div class="stat-icon">👥</div>
          <div class="stat-number" id="live-total">—</div>
          <div class="stat-label">Total de Convidados</div>
        </div>
        <div class="main-stat-card highlight-ok">
          <div class="stat-icon">✓</div>
          <div class="stat-number" id="live-presentes">—</div>
          <div class="stat-label">Presentes</div>
          <div class="stat-sub" id="live-presentes-pct">—</div>
        </div>
        <div class="main-stat-card highlight-warn">
          <div class="stat-icon">⏳</div>
          <div class="stat-number" id="live-pendentes">—</div>
          <div class="stat-label">Pendentes</div>
          <div class="stat-sub" id="live-pendentes-pct">—</div>
        </div>
      </div>

      <!-- BUSCA E LISTA -->
      <div class="search-section">
        <div class="search-label">Filtro</div>
        <input type="text" class="dash-search" id="live-search" placeholder="Procurar convidado..." oninput="Dashboard.filterGuests(this.value)">
      </div>

      <div id="live-list" class="guest-list"></div>
    </div>

    <!-- MODO: RSVP AO VIVO -->
    <div id="mode-rsvp" class="mode-pane" style="display:none">
      <div class="event-title-block" id="rsvp-event-block">
        <div class="event-label">Evento Selecionado</div>
        <div class="event-name" id="rsvp-event-name">—</div>
      </div>

      <!-- STATS RSVP -->
      <div class="rsvp-stats">
        <div class="rsvp-stat">
          <div class="rsvp-stat-val" id="rsvp-total">—</div>
          <div class="rsvp-stat-lbl">Total</div>
        </div>
        <div class="rsvp-stat sage">
          <div class="rsvp-stat-val" id="rsvp-confirmado">—</div>
          <div class="rsvp-stat-lbl">Confirmados</div>
        </div>
        <div class="rsvp-stat warn">
          <div class="rsvp-stat-val" id="rsvp-aguardando">—</div>
          <div class="rsvp-stat-lbl">Aguardando</div>
        </div>
        <div class="rsvp-stat">
          <div class="rsvp-stat-val" id="rsvp-recusado">—</div>
          <div class="rsvp-stat-lbl">Recusados</div>
        </div>
      </div>

      <!-- BUSCA E LISTA RSVP -->
      <div class="search-section">
        <div class="search-label">Filtro</div>
        <input type="text" class="dash-search" id="rsvp-search" placeholder="Procurar convidado..." oninput="Dashboard.filterRsvp(this.value)">
      </div>

      <div id="rsvp-list" class="guest-list"></div>
    </div>

  </div>
</div>

<script>
/**
 * DASHBOARD AO VIVO
 * Sincronização em tempo real com Firestore
 */

const firebaseConfig={
  apiKey:"AIzaSyDGl8-K4Hh6WyStKm_9pJxTSBYfGvvJAP0",
  authDomain:"inspire-eventos.firebaseapp.com",
  projectId:"inspire-eventos",
  storageBucket:"inspire-eventos.appspot.com",
  messagingSenderId:"1055449854646",
  appId:"1:1055449854646:web:e29299e9fe23b14db0a7ac"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const norm=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const esc=s=>s.replace(/[<>"&]/g,c=>({'<':'&lt;','>':'&gt;','"':'&quot;','&':'&amp;'}[c]));
const fmtTime=t=>new Date(t).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
const fmtDate=t=>new Date(t).toLocaleDateString('pt-BR');

const Dashboard={
  _activeId:null,
  _activeEvent:null,
  _all:[],
  _unsub:null,
  _currentMode:'live',
  _searchQuery:'',

  init(){
    // Tentar obter evento da URL ou localStorage
    const params=new URLSearchParams(window.location.search);
    const eventId=params.get('event')||localStorage.getItem('dashboardEventId');
    
    if(eventId){
      this.selectEvent(eventId);
    }else{
      this.promptEventSelection();
    }
  },

  promptEventSelection(){
    // Listar eventos
    db.collection('events').onSnapshot(snap=>{
      const events=snap.docs.map(d=>({...d.data(),id:d.id}));
      if(!events.length){
        document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;text-align:center"><div><h2 style="font-family:Georgia,serif">Nenhum evento encontrado</h2><p>Crie um evento no sistema principal</p></div></div>';
        return;
      }
      const eventId=events[0].id;
      localStorage.setItem('dashboardEventId',eventId);
      this.selectEvent(eventId);
    });
  },

  selectEvent(id){
    this._activeId=id;
    localStorage.setItem('dashboardEventId',id);
    
    if(this._unsub)this._unsub();
    
    // Buscar evento
    db.collection('events').doc(id).get().then(doc=>{
      if(doc.exists){
        this._activeEvent={...doc.data(),id:doc.id};
        document.getElementById('live-event-name').textContent=this._activeEvent.nome;
        document.getElementById('rsvp-event-name').textContent=this._activeEvent.nome;
      }
    });

    // Real-time sync de convidados
    this._unsub=db.collection('events').doc(id).collection('guests').onSnapshot(snap=>{
      this._all=snap.docs.map(d=>({...d.data(),id:d.id}));
      this.updateDashboard();
    });
  },

  updateDashboard(){
    if(this._currentMode==='live'){
      this.updateLiveMode();
    }else{
      this.updateRsvpMode();
    }
  },

  updateLiveMode(){
    const total=this._all.reduce((sum,g)=>sum+1+(g.acompanhantes||0),0);
    const presentes=this._all.reduce((sum,g)=>sum+(g.presentesNaEntrada||0),0);
    const pendentes=Math.max(total-presentes,0);
    const pct_p=total>0?Math.round((presentes/total)*100):0;
    const pct_pend=total>0?Math.round((pendentes/total)*100):0;

    document.getElementById('live-total').textContent=total;
    document.getElementById('live-presentes').textContent=presentes;
    document.getElementById('live-presentes-pct').textContent=pct_p+'%';
    document.getElementById('live-pendentes').textContent=pendentes;
    document.getElementById('live-pendentes-pct').textContent=pct_pend+'%';

    this.renderLiveList();
  },

  updateRsvpMode(){
    const total=this._all.length;
    const confirmado=this._all.filter(g=>g.status==='confirmado').length;
    const aguardando=this._all.filter(g=>g.status==='aguardando').length;
    const recusado=this._all.filter(g=>g.status==='recusado').length;

    document.getElementById('rsvp-total').textContent=total;
    document.getElementById('rsvp-confirmado').textContent=confirmado;
    document.getElementById('rsvp-aguardando').textContent=aguardando;
    document.getElementById('rsvp-recusado').textContent=recusado;

    this.renderRsvpList();
  },

  renderLiveList(){
    let list=this._all;
    if(this._searchQuery){
      const q=norm(this._searchQuery);
      list=list.filter(g=>norm(g.nome).includes(q));
    }
    // Presentes primeiro, depois pendentes
    const sorted=list.slice().sort((a,b)=>{
      if(a.checkedIn&&!b.checkedIn)return-1;
      if(!a.checkedIn&&b.checkedIn)return 1;
      return norm(a.nome).localeCompare(norm(b.nome));
    });

    const html=sorted.length?sorted.map(g=>`<div class="guest-item${g.checkedIn?' presente':''}">
      <div class="guest-dot"></div>
      <div class="guest-name">${esc(g.nome)}</div>
      <div class="guest-meta" style="font-size:.75rem;min-width:90px">PAX ${1+(g.acompanhantes||0)}${g.checkedIn?` · PP ${g.presentesNaEntrada||1}`:''}</div>
      ${g.checkedIn?`<div class="guest-badge presente">✓ ${fmtTime(g.checkinTime)}</div>`:`<div class="guest-badge aguardando">⏳</div>`}
    </div>`).join(''):'<div class="no-results">Nenhum convidado encontrado</div>';

    document.getElementById('live-list').innerHTML=html;
  },

  renderRsvpList(){
    let list=this._all;
    if(this._searchQuery){
      const q=norm(this._searchQuery);
      list=list.filter(g=>norm(g.nome).includes(q));
    }
    const sorted=list.slice().sort((a,b)=>norm(a.nome).localeCompare(norm(b.nome)));

    const html=sorted.length?sorted.map(g=>{
      let badgeClass='aguardando';
      let badgeText='⏳ Aguardando';
      if(g.status==='confirmado'){badgeClass='confirmado';badgeText='✓ Confirmado';}
      else if(g.status==='recusado'){badgeClass='recusado';badgeText='✕ Recusado';}
      return `<div class="guest-item">
        <div class="guest-dot"></div>
        <div class="guest-name">${esc(g.nome)}</div>
        <div class="guest-meta" style="font-size:.75rem;min-width:60px">PAX ${1+(g.acompanhantes||0)}</div>
        <div class="guest-badge ${badgeClass}">${badgeText}</div>
      </div>`;
    }).join(''):'<div class="no-results">Nenhum convidado encontrado</div>';

    document.getElementById('rsvp-list').innerHTML=html;
  },

  filterGuests(query){
    this._searchQuery=query;
    this.renderLiveList();
  },

  filterRsvp(query){
    this._searchQuery=query;
    this.renderRsvpList();
  }
};

function showMode(mode){
  Dashboard._currentMode=mode;
  document.getElementById('mode-live').style.display=mode==='live'?'block':'none';
  document.getElementById('mode-rsvp').style.display=mode==='rsvp'?'block':'none';
  document.querySelectorAll('.mode-card').forEach((el,idx)=>{
    el.classList.toggle('active',(idx===0&&mode==='live')||(idx===1&&mode==='rsvp'));
  });
  Dashboard.updateDashboard();
}

document.addEventListener('DOMContentLoaded',()=>{
  Dashboard.init();
});

// Status de conexão
setInterval(()=>{
  const online=navigator.onLine;
  const syncEl=document.getElementById('sync-status');
  syncEl.textContent=online?'🟢 Online':'🔴 Offline';
},5000);
</script>
</body>
</html>
